name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install
      - run: npm --version
      - run: npm run ci

      - uses: changesets/action@v1
        with:
          # npm auth is provided via OIDC trusted publishing, not NPM_TOKEN.
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: npm run version-packages
          publish: npm run release
