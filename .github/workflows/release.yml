name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install
      - run: npm --version
      - run: npm run ci

      - name: Enable npm token auth for bootstrap publishes
        if: ${{ vars.NPM_PUBLISH_AUTH == 'token' }}
        run: |
          echo "NPM_TOKEN=${{ secrets.NPM_TOKEN }}" >> "$GITHUB_ENV"
          echo "NODE_AUTH_TOKEN=${{ secrets.NPM_TOKEN }}" >> "$GITHUB_ENV"

      - uses: changesets/action@v1
        with:
          # A custom token is required so release PR updates can trigger PR workflows.
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          version: npm run version-packages
          publish: npm run release
