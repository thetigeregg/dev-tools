name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install
      - run: npm --version
      - run: npm run ci

      - name: Validate npm token bootstrap configuration
        if: ${{ vars.NPM_PUBLISH_AUTH == 'token' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_PUBLISH_AUTH is set to token, but the NPM_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Publish with trusted publishing
        uses: changesets/action@v1
        if: ${{ vars.NPM_PUBLISH_AUTH != 'token' }}
        with:
          # A custom token is required so release PR updates can trigger PR workflows.
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          version: npm run version-packages
          publish: npm run release

      - name: Publish with npm token bootstrap
        uses: changesets/action@v1
        if: ${{ vars.NPM_PUBLISH_AUTH == 'token' }}
        with:
          # A custom token is required so release PR updates can trigger PR workflows.
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          version: npm run version-packages
          publish: npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
