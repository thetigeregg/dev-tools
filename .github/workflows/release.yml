name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Changesets GitHub token configuration
        env:
          CHANGESETS_GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
        run: |
          if [ -z "$CHANGESETS_GITHUB_TOKEN" ]; then
            echo "CHANGESETS_GITHUB_TOKEN is required to create or update the release PR." >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Verify npm version
        run: npm --version

      - run: npm install
      - run: npm run ci

      - name: Create release PR or publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          # A custom token is required so release PR updates can trigger PR workflows.
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          commit: "chore(release): version packages"
          version: npm run version-packages

      - name: Publish packages to npm
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' }}
        run: npm run release
