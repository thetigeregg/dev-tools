name: Release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-pr:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install
      - run: npm --version
      - run: npm run ci

      - name: Create or update release PR
        uses: changesets/action@v1
        with:
          # A custom token is required so release PR updates can trigger PR workflows.
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          version: npm run version-packages

  publish:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'changeset-release/') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install
      - run: npm --version
      - run: npm run ci

      - name: Validate npm token bootstrap configuration
        if: ${{ vars.NPM_PUBLISH_AUTH == 'token' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_PUBLISH_AUTH is set to token, but the NPM_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Publish with trusted publishing
        if: ${{ vars.NPM_PUBLISH_AUTH != 'token' }}
        uses: changesets/action@v1
        with:
          # A custom token is required so release PR updates can trigger PR workflows.
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          publish: npm run release

      - name: Publish with npm token bootstrap
        if: ${{ vars.NPM_PUBLISH_AUTH == 'token' }}
        uses: changesets/action@v1
        with:
          # A custom token is required so release PR updates can trigger PR workflows.
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          publish: npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
